apiVersion: v2
name: home-server
description: A Helm chart for Kubernetes
type: application
version: 1.0.0
appVersion: 1.0.0

dependencies:
  - name: app
    version: 1.0.0
    repository: file://./charts/app
    condition: app.enabled
  - name: cache
    version: 1.0.0
    repository: file://./charts/cache
    condition: cache.enabled
  - name: db
    version: 1.0.0
    repository: file://./charts/db
    condition: db.enabled
  - name: worker
    version: 1.0.0
    repository: file://./charts/worker
    condition: worker.enabled
