replicaCount: 1

image:
  repository: redis
  pullPolicy: IfNotPresent
  tag: 7-alpine

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 6379

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 999
  fsGroup: 999
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  # Not read-only: Redis writes its RDB snapshot to /data on the container fs.

nodeSelector: {}
tolerations: []
affinity: {}
