replicaCount: 1

image:
  repository: ghcr.io/cpcwood/home-server-worker
  pullPolicy: IfNotPresent
  tag: latest

nameOverride: ""
fullnameOverride: ""

terminationGracePeriodSeconds: 60

healthcheck:
  path: /
  port: 7433
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 2
  startupFailureThreshold: 30

# Mirrors app.config — same Rails codebase. AWS_BUCKET is synced in via the
# app-storage bundle (random suffix), not set here.
config:
  AWS_REGION: "eu-west-2"
  DB_HOST: "home-server-db.home-server-production.svc.cluster.local."
  EMAIL_ASSET_HOST: "https://cpcwood.com"
  EMAIL_COMPANY_NAME: "Chris Wood"
  EMAIL_DEFAULT_ADDRESS: "contact@cpcwood.com"
  EMAIL_DEFAULT_NAME: "Chris Wood"
  EMAIL_HELO_DOMAIN: "cpcwood.com"
  EMAIL_NO_REPLY_ADDRESS: "contact@cpcwood.com"
  EMAIL_SMTP_SERVER_ADDRESS: "email-smtp.eu-west-2.amazonaws.com"
  EMAIL_SMTP_SERVER_PORT: "465"
  PUMA_MAX_THREADS: "16"
  PUMA_STARTING_THREADS: "1"
  REDIS_HOST: "home-server-cache.home-server-production.svc.cluster.local."
  SITE_HOST: "cpcwood.com"

# Same bundles as the app — one source of truth, no duplication.
externalSecrets:
  appBundle: app
  dbBundle: db
  storageBundle: app-storage
  emailBundle: email

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: false

nodeSelector: {}
tolerations: []
affinity: {}
