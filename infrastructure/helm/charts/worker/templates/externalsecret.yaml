apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "worker.fullname" . }}
  labels:
    {{- include "worker.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.global.externalSecretRefreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.global.clusterSecretStore }}
  target:
    name: {{ include "worker.fullname" . }}-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  # Worker runs the same Rails codebase as app — same env shape, including the
  # Postgres and S3 storage credentials re-keyed from their bundles.
  dataFrom:
    - extract:
        key: {{ .Values.global.secretPrefix }}/{{ .Values.externalSecrets.appBundle }}
  data:
    - secretKey: DB_USERNAME
      remoteRef:
        key: {{ .Values.global.secretPrefix }}/{{ .Values.externalSecrets.dbBundle }}
        property: POSTGRES_USER
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.global.secretPrefix }}/{{ .Values.externalSecrets.dbBundle }}
        property: POSTGRES_PASSWORD
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: {{ .Values.global.secretPrefix }}/{{ .Values.externalSecrets.storageBundle }}
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: {{ .Values.global.secretPrefix }}/{{ .Values.externalSecrets.storageBundle }}
        property: AWS_SECRET_ACCESS_KEY
    - secretKey: AWS_BUCKET
      remoteRef:
        key: {{ .Values.global.secretPrefix }}/{{ .Values.externalSecrets.storageBundle }}
        property: AWS_BUCKET
