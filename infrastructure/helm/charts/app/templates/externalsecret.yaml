apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.global.externalSecretRefreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.global.clusterSecretStore }}
  target:
    name: {{ include "app.fullname" . }}-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  # app bundle verbatim, plus db + storage creds re-keyed to the names Rails
  # expects (DB_*, AWS_*). AWS_BUCKET comes through here, not the ConfigMap.
  dataFrom:
    - extract:
        key: {{ .Values.global.secretPrefix }}/{{ .Values.externalSecrets.appBundle }}
  data:
    - secretKey: DB_USERNAME
      remoteRef:
        key: {{ .Values.global.secretPrefix }}/{{ .Values.externalSecrets.dbBundle }}
        property: POSTGRES_USER
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.global.secretPrefix }}/{{ .Values.externalSecrets.dbBundle }}
        property: POSTGRES_PASSWORD
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: {{ .Values.global.secretPrefix }}/{{ .Values.externalSecrets.storageBundle }}
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: {{ .Values.global.secretPrefix }}/{{ .Values.externalSecrets.storageBundle }}
        property: AWS_SECRET_ACCESS_KEY
    - secretKey: AWS_BUCKET
      remoteRef:
        key: {{ .Values.global.secretPrefix }}/{{ .Values.externalSecrets.storageBundle }}
        property: AWS_BUCKET
