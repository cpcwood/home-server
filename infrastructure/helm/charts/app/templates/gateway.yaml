{{- if .Values.gateway.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  annotations:
    # cert-manager issues one Certificate per certificateRefs Secret, covering
    # every listener hostname that shares it.
    cert-manager.io/cluster-issuer: {{ .Values.gateway.clusterIssuer }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    {{- range $host := .Values.gateway.hostnames }}
    - name: https-{{ $host | replace "." "-" }}
      protocol: HTTPS
      port: 443
      hostname: {{ $host | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ $.Values.gateway.tlsSecretName }}
      allowedRoutes:
        namespaces:
          from: Same
    {{- end }}
{{- end }}
