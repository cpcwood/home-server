# Umbrella chart values. Only override subchart defaults that differ for this
# deployment — each subchart owns its own defaults in charts/<name>/values.yaml.
#
# `global.*` keys propagate to every subchart automatically (Helm convention).
# Override per-environment by passing `--set global.secretPrefix=...`.

global:
  # AWS Parameter Store path prefix (leading `/` is the PS convention). Every
  # ExternalSecret in every subchart constructs its remote key as
  # `<secretPrefix>/<bundle>`. Must match the resources created by
  # infrastructure/terraform/secrets.tf.
  secretPrefix: /cpcwood-k8s/home-server/production
  # Platform-provided ClusterSecretStore — see docs/platform-contract.md.
  clusterSecretStore: aws-parameter-store
  externalSecretRefreshInterval: 1h

# Namespace-wide egress isolation (see templates/networkpolicy.yaml). clusterCIDRs
# are k3s' defaults — egress to these (i.e. other namespaces) is blocked, while
# same-namespace traffic, DNS, and the public internet stay allowed.
networkPolicy:
  enabled: true
  clusterCIDRs:
    - 10.42.0.0/16
    - 10.43.0.0/16
  dnsNamespace: kube-system

# Grafana dashboard shipped as a ConfigMap (see templates/grafana-dashboard.yaml),
# auto-discovered by the platform's kube-prometheus-stack sidecar.
grafanaDashboard:
  enabled: true

app:
  enabled: true

cache:
  enabled: true

db:
  enabled: true

worker:
  enabled: true
