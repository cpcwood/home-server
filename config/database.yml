default: &default
  adapter: postgresql
  encoding: unicode
  username: <%= ENV['DB_USERNAME'] %>
  password: <%= ENV['DB_PASSWORD']  %>
  host: <%= ENV.fetch('DB_HOST') { 'localhost' } %>
  port: <%= ENV.fetch('DB_PORT') { 5432 } %>
  # must cover Puma's max threads or requests block on connection checkout
  pool: <%= ENV.fetch('PUMA_MAX_THREADS') { 5 } %>
  timeout: 5000

production:
  <<: *default
  database: home_server_production

development:
  <<: *default
  database: home_server_development

test:
  <<: *default
  database: home_server_test
